name: Build Development APK

on:
  push:
    branches:
      - build
  pull_request:
    branches:
      - build
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17 (Required by modern AGP and Kotlin compiler)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # Step 3: Set up Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Step 4: Prepare Environment Configuration (.env)
      # The secrets-gradle-plugin requires .env to exist, even with dummy values for compilation
      - name: Prepare Environment Config
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "GEMINI_API_KEY=dummy_value" > .env
          fi

      # Step 5: Restore / Decode Debug Keystore
      # This ensures the build task can sign the debug APK using the identical app credentials
      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore from base64"
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "No debug.keystore.base64 found, generating debug.keystore for CI"
            keytool -genkeypair -v \
              -keystore debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      # Step 6: Set up Gradle
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Step 7: Build with Gradle
      - name: Build Debug APK
        run: gradle :app:assembleDebug --no-daemon

      # Step 8: Find and Verify APK Output
      - name: Verify APK Generation
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: No debug APK found in output directory!"
            exit 1
          else
            echo "Found debug APK at: $APK_PATH"
            echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          fi

      # Step 9: Upload the output APK as a build artifact
      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: resido-dev-apk
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 14
